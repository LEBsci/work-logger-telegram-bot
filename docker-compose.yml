services:
  bot:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DB_PATH: /app/data/work_logs.db
    volumes:
      - bot_data:/app/data
    expose:
      - "8000"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      WEBHOOK_DOMAIN: ${WEBHOOK_DOMAIN}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - bot

volumes:
  bot_data:
  caddy_data:
  caddy_config:
